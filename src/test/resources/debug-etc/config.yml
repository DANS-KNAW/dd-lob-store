#
# dd-lob-store configuration file
#
server:
  applicationContextPath: /
  adminContextPath: /
  applicationConnectors:
    - type: http
      port: 20385
  adminConnectors:
    - type: http
      port: 20386
  # Logs the requests to the Jetty http server
  requestLog:
    appenders:
      - type: file
        archive: false
        timeZone: system
        currentLogFilename: /var/opt/dans.knaw.nl/log/dd-lob-store/request.log

dataStations:
  - name: archaeology
    baseUrl: https://dev.archaeology.datastations.nl
    apiKey: changeme
    lobStore:
      user: changeme
      host: archive.surfsara.nl
      path: archive/data-vault/archaelogy.lobs

database:
  driverClass: org.postgresql.Driver
  user: dd_lob_store
  password: dd_lob_store
  url: jdbc:postgresql://localhost:5432/dd_lob_store
  properties:
    charSet: UTF-8
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  maxSize: 8
  minSize: 2
  checkConnectionWhileIdle: false
  evictionInterval: 10s
  minIdleTime: 1 minute

httpClient:
  timeout: 500ms
  connectionTimeout: 500ms
  connectionRequestTimeout: 500ms
  timeToLive: 1h
  cookiesEnabled: false
  maxConnections: 1024
  maxConnectionsPerRoute: 1024
  keepAlive: 0s
  userAgent: dd-lob-store

transfer:
  download:
    chunkSize: 1G
    baseDir: data/download
    minimalBucketSize: 1G
    quota: 100G
  packageConfig:
    baseDir: data/upload
    packageCommand: /usr/local/bin/package.sh
    verifyCommand: /usr/local/bin/verify-package.sh
    quota: 100G
  transferJob:
    transferCommand: /usr/local/bin/transfer.sh
    destination: /data/vault
  verify:
    verifyCommand: /usr/local/bin/verify-transfer.sh
    sshCommand: ssh

#
# See https://www.dropwizard.io/en/latest/manual/configuration.html#logging
#
logging:
  level: INFO
  appenders:
    - type: file
      archive: false
      timeZone: system
      currentLogFilename: /var/opt/dans.knaw.nl/log/dd-lob-store/dd-lob-store.log
    - type: console
      # Used in combination with journald, which already adds the timestamp
      logFormat: "%-5p %c{0}: %m%n%dwREx"
  loggers:
    'org.hibernate.engine.internal.StatisticalLoggingSessionEventListener': 'OFF'
