#
# dd-lob-store configuration file
#
server:
  applicationContextPath: /
  adminContextPath: /
  applicationConnectors:
    - type: http
      port: 20385
  adminConnectors:
    - type: http
      port: 20386
  # Logs the requests to the Jetty http server
  requestLog:
    appenders:
      - type: file
        archive: false
        timeZone: system
        currentLogFilename: /var/opt/dans.knaw.nl/log/dd-lob-store/request.log

dataStations:
  - name: archaeology
    baseUrl: https://archaeology.datastations.nl
    apiKey: changeme
    lobStore:
      user: changeme
      host: archive.surfsara.nl
      path: archive/data-vault/archaelogy.lobs

transfer:
  download:
    requireRangeRequests: true
    baseDir: /data/lob-transfer/download
    minimalBucketSize: 1G
  package:
    baseDir: /data/lob-transfer/upload
    packageCommand:
    verifyCommand:
  transfer:
    transferCommand:
    retryAfter: 2min
  verify:
    verifyCommand:

#
# See https://www.dropwizard.io/en/latest/manual/configuration.html#logging
#
logging:
  level: INFO
  appenders:
    - type: file
      archive: false
      timeZone: system
      currentLogFilename: /var/opt/dans.knaw.nl/log/dd-lob-store/dd-lob-store.log
    - type: console
      # Used in combination with journald, which already adds the timestamp
      logFormat: "%-5p %c{0}: %m%n%dwREx"
  loggers:
    'org.hibernate.engine.internal.StatisticalLoggingSessionEventListener': 'OFF'
